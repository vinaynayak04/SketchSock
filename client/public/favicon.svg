<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="100%" height="100%">
  <!-- Clean background for tab contrast -->
  <rect width="64" height="64" rx="16" fill="#0f172a" opacity="0.4" />
  
  <!-- Paint Palette Outline & Fill -->
  <path d="M14,32 C14,20 22,12 36,12 C48,12 54,20 54,29 C54,36 49,42 42,42 H38 C34,42 32,45 32,49 C32,53 28,56 20,56 C15,56 14,48 14,32 Z" fill="#f8fafc" stroke="#6366f1" stroke-width="3" stroke-linejoin="round" />
  
  <!-- Thumb Hole -->
  <circle cx="22" cy="44" r="4" fill="#0f172a" />
  
  <!-- Vibrant Colorful Paint Splats -->
  <circle cx="22" cy="24" r="4.5" fill="#f43f5e" /> <!-- Neon Red -->
  <circle cx="33" cy="20" r="4.5" fill="#f59e0b" /> <!-- Neon Amber -->
  <circle cx="44" cy="24" r="4.5" fill="#10b981" /> <!-- Neon Emerald -->
  <circle cx="46" cy="33" r="4.5" fill="#06b6d4" /> <!-- Neon Cyan -->
  
  <!-- Artist Paintbrush -->
  <path d="M18,50 L44,24" stroke="#475569" stroke-width="4.5" stroke-linecap="round" />
  <!-- Brush Tip -->
  <path d="M44,24 L48,20 L47,26 Z" fill="#6366f1" stroke="#6366f1" stroke-width="1" stroke-linejoin="round" />
  <!-- Brush highlight -->
  <path d="M46,22 L48,20" stroke="#a5b4fc" stroke-width="1.5" stroke-linecap="round" />
</svg>